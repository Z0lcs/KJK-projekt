<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJK Kaland</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Sötét Labirintus</h1>
            <div id="stats">
                Életerő: <span id="hp">10</span> | Tárgyak: <span id="inventory">Semmi</span>
            </div>
        </header>
        
        <main id="scene">
            <p id="text">Betöltés...</p>
            <div id="choices"></div>
            <button id="dice-btn">Kockadobás (1d6)</button>
            <p id="dice-result"></p>
        </main>

        <button id="save-btn">Mentés</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
