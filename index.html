<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJK project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="stlye.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container">

        <div class="button">
            <a href="bekeres.html" title="Fájl betöltése"><i class="fa-solid fa-file"></i></a>
        </div>

        <div class="left-column">

            <div id="player-static">
                <h3><i class="fa-solid fa-scroll"></i> Kalandlap</h3>
                <div class="stat-row">
                    <span class="stat-label">Ügyesség</span>
                    <span id="skill-val" class="stat-num">0</span>
                </div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar skill-bar" id="skill-bar"></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Életerő</span>
                    <span id="stamina-val" class="stat-num">0</span>
                    <span class="stat-max" id="stamina-max"></span>
                </div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar stamina-bar" id="stamina-bar"></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Szerencse</span>
                    <span id="luck-val" class="stat-num">0</span>
                </div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar luck-bar" id="luck-bar"></div>
                </div>
            </div>

            <div id="inventory">
                <h3><i class="fa-solid fa-briefcase"></i> Hátizsák</h3>
                <div id="inventory-slots">
                    <div class="item-slot empty" id="slot-0"></div>
                    <div class="item-slot empty" id="slot-1"></div>
                    <div class="item-slot empty" id="slot-2"></div>
                    <div class="item-slot empty" id="slot-3"></div>
                    <div class="item-slot empty" id="slot-4"></div>
                    <div class="item-slot empty" id="slot-5"></div>
                    <div class="item-slot empty" id="slot-6"></div>
                    <div class="item-slot empty" id="slot-7"></div>
                    <div class="item-slot empty" id="slot-8"></div>
                </div>
            </div>
        </div>

        <div id="book">
            <h2 id="chapter-title">— — —</h2>
            <div id="description">
                Kérlek, tölts be egy könyv fájlt a bal felső sarokban!
            </div>
            <div class="options-container" id="options-container"></div>
        </div>

    </div>

    <!-- ═══════════════════════════════════════════
         CSATA PANEL
         ═══════════════════════════════════════════ -->
    <div id="fight">
        <div id="fight-inner">
            <h2><i class="fa-solid fa-sword"></i> Csata</h2>

            <div id="combatants">
                <div class="combatant" id="player-combatant">
                    <div class="combatant-name">Te</div>
                    <div class="hp-bar-wrap">
                        <div class="hp-bar player-hp" id="player-hp-bar"></div>
                    </div>
                    <div class="hp-label"><span id="fight-player-stamina">—</span> ÉP</div>
                    <div class="dice-result" id="player-dice-result">—</div>
                </div>

                <div id="vs-label">VS</div>

                <div class="combatant" id="enemy-combatant">
                    <div class="combatant-name" id="enemy-name">—</div>
                    <div class="hp-bar-wrap">
                        <div class="hp-bar enemy-hp" id="enemy-hp-bar"></div>
                    </div>
                    <div class="hp-label"><span id="enemy-stamina">—</span> ÉP</div>
                    <div class="dice-result" id="enemy-dice-result">—</div>
                </div>
            </div>

            <div id="battle-log">Dobj a kockával a harc megkezdéséhez!</div>

            <!-- ═══════════════════════════════
                 KÉT DARAB 3D CSS KOCKA
                 Az első kocka (dice-cube-1) a játékos 1. dobását,
                 a második (dice-cube-2) a 2. dobását mutatja.
                 Együtt adják a 2d6 összegét.
                 ═══════════════════════════════ -->
            <div id="dice-container">

                <div id="dice-scenes">

                    <!-- 1. kocka -->
                    <div class="dice-scene-wrap">
                        <div class="dice-scene">
                            <div id="dice-cube-1" class="dice-cube face-1">
                                <div class="face front">
                                    <div class="dots d1"><span></span></div>
                                </div>
                                <div class="face back">
                                    <div class="dots d6"><span></span><span></span><span></span><span></span><span></span><span></span></div>
                                </div>
                                <div class="face right">
                                    <div class="dots d3"><span></span><span></span><span></span></div>
                                </div>
                                <div class="face left">
                                    <div class="dots d4"><span></span><span></span><span></span><span></span></div>
                                </div>
                                <div class="face top">
                                    <div class="dots d2"><span></span><span></span></div>
                                </div>
                                <div class="face bottom">
                                    <div class="dots d5"><span></span><span></span><span></span><span></span><span></span></div>
                                </div>
                            </div>
                        </div>
                        <div class="dice-label" id="dice-label-1">—</div>
                    </div>

                    <!-- 2. kocka -->
                    <div class="dice-scene-wrap">
                        <div class="dice-scene">
                            <div id="dice-cube-2" class="dice-cube face-1">
                                <div class="face front">
                                    <div class="dots d1"><span></span></div>
                                </div>
                                <div class="face back">
                                    <div class="dots d6"><span></span><span></span><span></span><span></span><span></span><span></span></div>
                                </div>
                                <div class="face right">
                                    <div class="dots d3"><span></span><span></span><span></span></div>
                                </div>
                                <div class="face left">
                                    <div class="dots d4"><span></span><span></span><span></span><span></span></div>
                                </div>
                                <div class="face top">
                                    <div class="dots d2"><span></span><span></span></div>
                                </div>
                                <div class="face bottom">
                                    <div class="dots d5"><span></span><span></span><span></span><span></span><span></span></div>
                                </div>
                            </div>
                        </div>
                        <div class="dice-label" id="dice-label-2">—</div>
                    </div>

                </div><!-- #dice-scenes -->

                <!-- Gombok -->
                <div id="fight-buttons">
                    <button id="dice-btn">
                        <i class="fa-solid fa-dice"></i> Kockadobás
                    </button>
                    <!-- Menekülés gomb: alapból rejtett, csak akkor jelenik meg,
                         ha a fight-parancsban meg van adva escape-fejezet -->
                    <button id="escape-btn" style="display:none;">
                        <i class="fa-solid fa-person-running"></i> Menekülés
                    </button>
                </div>

            </div><!-- #dice-container -->
        </div><!-- #fight-inner -->
    </div><!-- #fight -->

    <!-- ITEM USE TOAST -->
    <div id="item-toast"></div>

</body>
</html>
