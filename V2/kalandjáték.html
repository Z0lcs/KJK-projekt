<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Árnykúp Labirintusa — Kalandjáték</title>
<style>
  /* ═══════════════════════════════════════════════════════════
     DESIGN: Sötét, kőbe vésett fantasy — Carolingi kézirat találkozik
     egy kopott dungeon-térképpel. Fő betűtípus: Crimson Pro (szerif, 
     olvasható, elegáns), display: MedievalSharp / IM Fell English.
  ═══════════════════════════════════════════════════════════ */

  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap');

  :root {
    --bg-deep:      #0d0c0a;
    --bg-mid:       #141210;
    --bg-panel:     #1a1714;
    --bg-card:      #201d18;
    --border:       #3a3025;
    --border-light: #5a4e38;
    --gold:         #c9a84c;
    --gold-dim:     #7a6130;
    --gold-bright:  #f0c96a;
    --amber:        #d4823a;
    --red-dark:     #8b2020;
    --red-mid:      #c0392b;
    --green-muted:  #3a6b45;
    --green-bright: #5ba870;
    --text-main:    #e8dfc9;
    --text-dim:     #9a8d75;
    --text-faint:   #5c5244;
    --shadow:       rgba(0,0,0,0.7);
    --glow-gold:    rgba(201,168,76,0.15);
    --glow-amber:   rgba(212,130,58,0.1);
    --font-body:    'Crimson Pro', Georgia, serif;
    --font-display: 'IM Fell English', 'Times New Roman', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 1.75;
    min-height: 100vh;
    /* Kőtextura-szerű háttér */
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(60,40,10,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(40,25,5,0.2) 0%, transparent 50%);
  }

  /* ─── Wrapper ─────────────────────────────────────────────── */
  #app {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ─── Fejléc ──────────────────────────────────────────────── */
  header {
    text-align: center;
    padding: 40px 0 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .game-title {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 0 30px var(--glow-gold), 0 2px 4px var(--shadow);
    line-height: 1.2;
  }
  .game-subtitle {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ─── Állapotsor (ÜGYESSÉG / ÉLETERŐ / SZERENCSE) ─────────── */
  #stats-bar {
    display: flex;
    gap: 10px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex: 1;
    min-width: 120px;
    transition: border-color 0.3s;
  }
  .stat-pill:hover { border-color: var(--border-light); }
  .stat-label { color: var(--text-faint); font-size: 0.72rem; }
  .stat-value {
    font-family: var(--font-display);
    font-size: 1.15rem;
    color: var(--gold);
    margin-left: auto;
    font-weight: 600;
  }
  .stat-value.low { color: var(--red-mid); }
  .stat-value.med { color: var(--amber); }

  /* ─── Tárgyak ─────────────────────────────────────────────── */
  #inventory-bar {
    min-height: 38px;
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .inv-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-right: 4px;
  }
  .inv-item {
    background: var(--bg-panel);
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    padding: 3px 10px;
    font-size: 0.8rem;
    color: var(--gold);
    animation: item-appear 0.3s ease;
  }
  @keyframes item-appear {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  .inv-empty { font-size: 0.8rem; color: var(--text-faint); font-style: italic; }

  /* ─── Fő játéktér ─────────────────────────────────────────── */
  #scene-area {
    margin-top: 28px;
  }

  /* Szakasz-fejléc (helyszín neve) */
  #scene-heading {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 0.06em;
    margin-bottom: 18px;
    padding-left: 14px;
    border-left: 3px solid var(--gold-dim);
    opacity: 0;
    animation: fade-in 0.5s ease forwards;
  }

  /* Szövegdoboz */
  #scene-text {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px 32px;
    line-height: 1.85;
    color: var(--text-main);
    position: relative;
    box-shadow: inset 0 2px 12px rgba(0,0,0,0.35), 0 0 40px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fade-in 0.6s ease 0.1s forwards;
  }
  /* Díszes sarokcsík */
  #scene-text::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dim) 30%, var(--gold-dim) 70%, transparent);
  }
  #scene-text p { margin-bottom: 14px; }
  #scene-text p:last-child { margin-bottom: 0; }
  #scene-text em { color: var(--gold); font-style: italic; }
  #scene-text strong { color: var(--gold-bright); font-weight: 600; }

  /* ─── Választási gombok ───────────────────────────────────── */
  #choices-area {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    animation: fade-in 0.5s ease 0.35s forwards;
  }
  .choice-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold-dim);
    border-radius: 4px;
    padding: 14px 20px;
    text-align: left;
    color: var(--text-main);
    font-family: var(--font-body);
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    line-height: 1.5;
  }
  .choice-btn:hover:not(:disabled) {
    background: #26211a;
    border-color: var(--border-light);
    border-left-color: var(--gold);
    transform: translateX(4px);
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    color: var(--gold-bright);
  }
  .choice-btn:active:not(:disabled) { transform: translateX(2px); }
  .choice-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-left-color: var(--text-faint);
  }
  .choice-btn .choice-num {
    color: var(--gold-dim);
    font-size: 0.78rem;
    margin-right: 8px;
    font-family: var(--font-display);
    letter-spacing: 0.05em;
  }
  /* "Tárgy szükséges" jelölő */
  .choice-btn .req-badge {
    display: inline-block;
    background: var(--red-dark);
    color: #e8b8b8;
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .choice-btn .item-badge {
    display: inline-block;
    background: var(--green-muted);
    color: #b8e8c8;
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ─── Végkifejlet-panel ───────────────────────────────────── */
  #outcome-area {
    margin-top: 22px;
    display: none;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    animation: fade-in 0.6s ease forwards;
  }
  #outcome-area.visible { display: flex; }

  .outcome-banner {
    text-align: center;
    padding: 22px 24px;
    border-radius: 6px;
    font-family: var(--font-display);
    font-size: 1.5rem;
    letter-spacing: 0.05em;
  }
  .outcome-banner.victory {
    background: linear-gradient(135deg, #0e2218, #163324);
    border: 1px solid var(--green-muted);
    color: var(--green-bright);
    text-shadow: 0 0 20px rgba(91,168,112,0.3);
  }
  .outcome-banner.defeat {
    background: linear-gradient(135deg, #1e0808, #2a0c0c);
    border: 1px solid var(--red-dark);
    color: #e07070;
    text-shadow: 0 0 20px rgba(192,57,43,0.3);
  }

  /* ─── Újrakezdés gomb ─────────────────────────────────────── */
  #restart-btn {
    display: none;
    margin: 6px auto 0;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 12px 36px;
    color: var(--gold);
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #restart-btn:hover {
    background: var(--glow-gold);
    border-color: var(--gold);
    color: var(--gold-bright);
  }
  #restart-btn.visible { display: block; }

  /* ─── Értesítés (tárgy szerzés stb.) ─────────────────────── */
  #notification {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--gold-dim);
    border-radius: 5px;
    padding: 12px 18px;
    font-size: 0.88rem;
    color: var(--gold);
    max-width: 280px;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(.2,1,.4,1), opacity 0.35s;
    z-index: 100;
    pointer-events: none;
  }
  #notification.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ─── Animációk ───────────────────────────────────────────── */
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Mobil finomhangolás ─────────────────────────────────── */
  @media (max-width: 520px) {
    body { font-size: 16px; }
    #scene-text { padding: 20px 18px; }
    .choice-btn { padding: 12px 14px; font-size: 0.95rem; }
    .stat-pill { min-width: 90px; padding: 5px 10px; }
    .game-title { font-size: 1.5rem; }
  }

  /* ─── Elválasztó díszítmény ───────────────────────────────── */
  .ornament {
    text-align: center;
    color: var(--gold-dim);
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    padding: 6px 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ── Fejléc ── -->
  <header>
    <div class="game-title">Az Árnykúp Labirintusa</div>
    <div class="game-subtitle">Kaland-Játék-Varázslat &nbsp;·&nbsp; I. Könyv</div>
  </header>

  <!-- ── Állapotsor ── -->
  <div id="stats-bar">
    <div class="stat-pill">
      <span class="stat-label">ÜGYESSÉG</span>
      <span class="stat-value" id="stat-skill">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">ÉLETERŐ</span>
      <span class="stat-value" id="stat-hp">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">SZERENCSE</span>
      <span class="stat-value" id="stat-luck">—</span>
    </div>
  </div>

  <!-- ── Tárgyak ── -->
  <div id="inventory-bar">
    <span class="inv-label">Zsák:</span>
    <span id="inventory-items"><span class="inv-empty">üres</span></span>
  </div>

  <!-- ── Jelenet ── -->
  <section id="scene-area">
    <div id="scene-heading"></div>
    <div id="scene-text"></div>
    <div id="choices-area"></div>
    <div id="outcome-area">
      <div id="outcome-banner" class="outcome-banner"></div>
    </div>
    <button id="restart-btn" onclick="restartGame()">↺ &nbsp;Újrakezdés</button>
  </section>

</div>

<!-- ── Értesítő ── -->
<div id="notification" id="notification"></div>


<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║   AZ ÁRNYKÚP LABIRINTUSA — Interaktív Kalandjáték          ║
   ║   ─────────────────────────────────────────────────────     ║
   ║   Rendszer: állapotgép (state machine) + inventory         ║
   ║   Bővítés: adj hozzá új jeleneteket a `scenes` objektumhoz ║
   ╚══════════════════════════════════════════════════════════════╝ */

// ═══════════════════════════════════════════════
//  JÁTÉKOS ÁLLAPOT
// ═══════════════════════════════════════════════
let player = {
  skill:    0,   // ÜGYESSÉG
  hp:       0,   // ÉLETERŐ
  luck:     0,   // SZERENCSE
  maxSkill: 0,
  maxHp:    0,
  maxLuck:  0,
  inventory: []  // tárgyak neve (string tömbként)
};

// Tárgyak kezelése
function hasItem(name)  { return player.inventory.includes(name); }
function addItem(name)  {
  if (!hasItem(name)) {
    player.inventory.push(name);
    showNotification('✦ Új tárgy: ' + name);
  }
}
function removeItem(name) {
  player.inventory = player.inventory.filter(i => i !== name);
}

// Stat változtatás
function changeStat(stat, delta) {
  player[stat] = Math.max(0, Math.min(player['max' + capitalize(stat)], player[stat] + delta));
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ═══════════════════════════════════════════════
//  JELENET-ADATBÁZIS
//  ─────────────────────────────────────────────
//  Minden jelenet objektum:
//  {
//    id:       'scene_id',          // egyedi azonosító (string)
//    title:    'Helyszín neve',     // fejlécben jelenik meg
//    text:     ['<p>...</p>', ...], // szövegbekezdések (HTML engedélyezett)
//    onEnter:  function(player){},  // opcionális: belépéskor fut (stat/item változás)
//    choices: [
//      {
//        text:     'Választás szövege',
//        next:     'scene_id',       // hová visz
//        requires: 'tárgy_neve',     // opcionális: ezt a tárgyat kell bírni
//        gives:    'tárgy_neve',     // opcionális: ezt a tárgyat adja
//        removes:  'tárgy_neve',     // opcionális: ezt a tárgyat elveszi
//        hpDelta:  -2,               // opcionális: ÉLETERŐ változás
//        luckDelta: 1,               // opcionális: SZERENCSE változás
//        skillDelta: 0,              // opcionális: ÜGYESSÉG változás
//      }
//    ],
//    ending:   'victory' | 'defeat' | null   // végkifejlet jelzése
//  }
// ═══════════════════════════════════════════════
const scenes = {

  /* ──────────────────────────────────────────────
     KEZDETI JELENET — ide kerül a játékos először
     ────────────────────────────────────────────── */
  start: {
    id: 'start',
    title: 'Prológus — A Hívás',
    text: [
      `<p>Hajnali ének ébreszt: <em>a kő énekel.</em></p>`,
      `<p>Három napja nem emlékszel semmire — csak a sötétségre, amely körülvett, és arra a hangra, amely egyre mélyebbre csalt. Most itt állsz az <strong>Árnykúp</strong> előtt, az ősöreg bazaltszikla tövénél, amelyből évszázadok óta szivárog az a hideg, bíborvörös fény.</p>`,
      `<p>A falusi öregek azt mondják: aki bejut és elhozza az <em>Ősvilág Magját</em> — a mélyen rejtőző kővé vált szívet —, az örök hatalmat nyer az árnyak felett. Aki nem jön ki... azt az útvesztő megemészti.</p>`,
      `<p>Hátizsákodban egy marék élelem, egy rozsdás kard, és valami halvány remény. A bejárat nyitva áll.</p>`,
    ],
    choices: [
      { text: 'Belelépsz a nyílásba. A hideg kő befogad.', next: 'entrance_hall' },
      { text: 'Körülnézel a szikla tövében, hátha találsz valamit.', next: 'search_outside' },
    ]
  },

  /* ── Külső kutatás ── */
  search_outside: {
    id: 'search_outside',
    title: 'A Szikla Töve',
    text: [
      `<p>Mohával borított kövek között turkálsz. Ujjaid valami hidegbe ütköznek: egy apró, ezüstös <em>Árnykő</em> hever a töredezett bazalt alatt.</p>`,
      `<p>A kő a tenyeredben különösen hideg — szinte él. Az öregasszony szavai jutnak eszedbe: <em>"Az Árnykő átment az élő és holt világ határain."</em></p>`,
      `<p>Felmarkolod, és belépsz az üregbe.</p>`,
    ],
    onEnter: function(p) { addItem('Árnykő'); },
    choices: [
      { text: 'Belelépsz a nyílásba.', next: 'entrance_hall' },
    ]
  },

  /* ── Bejárat ── */
  entrance_hall: {
    id: 'entrance_hall',
    title: 'A Bejárati Csarnok',
    text: [
      `<p>A falak izzadnak. Bíborvörös mohák fonják be a köveket; ahol megérintenéd őket, suttogásszerű rezgés fut végig a kőzeten.</p>`,
      `<p>Előtted két folyosó nyílik. A <strong>bal oldali</strong> belőle erős vizes szag árad — talán víz alatti rész. A <strong>jobb oldali</strong>ból szürkés füst kúszik, és halvány kopogás hallatszik.</p>`,
      `<p>A mennyezeten egy régi rúna ég narancssárgán: <em>„Csak az juthat tovább, aki tud hallgatni."</em></p>`,
    ],
    choices: [
      { text: 'A bal folyosóra mégy — a víz szagát követed.', next: 'water_corridor' },
      { text: 'A jobb folyosóra mégy — a kopogást vizsgálod.', next: 'smoke_room' },
      { text: 'Megállsz és figyelsz. Hallgatod a követ.', next: 'listen_rune', luckDelta: 1 },
    ]
  },

  /* ── Hallgatás ── */
  listen_rune: {
    id: 'listen_rune',
    title: 'A Rúna Üzenete',
    text: [
      `<p>Behunyt szemmel állsz. A kő suttog — nem szavakban, hanem képekben. Egy szikrázó mozaikot látsz: az útvesztő vége egy <em>kút</em>, amelynek peremén három csillag ég.</p>`,
      `<p>Valami melegség fut a mellkasodon át. A rúna fénye halványul; úgy érzed, a labirintus valamilyen ismeretlen okból meghajolt előtted.</p>`,
      `<p><strong>SZERENCSE +1</strong> — a labirintus elismeri az érzékenységedet.</p>`,
    ],
    choices: [
      { text: 'A bal folyosóra mégy.', next: 'water_corridor' },
      { text: 'A jobb folyosóra mégy.', next: 'smoke_room' },
    ]
  },

  /* ── Vizes folyosó ── */
  water_corridor: {
    id: 'water_corridor',
    title: 'A Vizes Folyosó',
    text: [
      `<p>Deréktájig ér a fekete víz. Valami surran a lábad mellett — nem ellenséges, inkább kíváncsi. Az alap a csúszós.</p>`,
      `<p>A folyosó egy elágazáshoz vezet: előre egy <strong>félig nyitott acélajtó</strong>, amelynek rozsdás zsanérjai nyikorognak, és bal oldalt egy <strong>szűk rés</strong> a kőzetben — épp hogy elfér rajta egy ember.</p>`,
    ],
    choices: [
      { text: 'Az acélajtón kísérelsz meg átmenni.', next: 'iron_door', hpDelta: -1 },
      { text: 'Átbújsz a szűk résen.', next: 'narrow_gap' },
      { text: 'Visszamész a bejárathoz és a másik folyosóra térsz.', next: 'smoke_room' },
    ]
  },

  /* ── Acélajtó ── */
  iron_door: {
    id: 'iron_door',
    title: 'Az Acélajtó Mögött',
    text: [

let currentSceneId = 'start';

/** Jelenet megjelenítése */
function renderScene(sceneId) {
  // Halál ellenőrzés
  if (player.hp <= 0 && sceneId !== 'start' && sceneId !== 'dead') {
    sceneId = 'dead';
  }

  currentSceneId = sceneId;
  const scene = scenes[sceneId];
  if (!scene) { console.error('Ismeretlen jelenet:', sceneId); return; }

  // onEnter hook
  if (scene.onEnter) scene.onEnter(player);

  // Fejléc
  const heading = document.getElementById('scene-heading');
  heading.style.animation = 'none';
  heading.textContent = scene.title || '';
  void heading.offsetWidth; // reflow
  heading.style.animation = 'fade-in 0.5s ease forwards';

  // Szöveg
  const textEl = document.getElementById('scene-text');
  textEl.style.animation = 'none';
  textEl.innerHTML = scene.text.join('');
  void textEl.offsetWidth;
  textEl.style.animation = 'fade-in 0.6s ease 0.1s forwards';

  // Választások
  const choicesEl = document.getElementById('choices-area');
  choicesEl.style.animation = 'none';
  choicesEl.innerHTML = '';
  void choicesEl.offsetWidth;
  choicesEl.style.animation = 'fade-in 0.5s ease 0.35s forwards';

  if (scene.choices && scene.choices.length > 0) {
    scene.choices.forEach((choice, idx) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';

      const meetsReq = !choice.requires || hasItem(choice.requires);

      let label = `<span class="choice-num">${idx + 1}.</span> ${choice.text}`;
      if (choice.requires && !meetsReq) {
        label += `<span class="req-badge">Kell: ${choice.requires}</span>`;
      }
      if (choice.gives) {
        label += `<span class="item-badge">✦ ${choice.gives}</span>`;
      }
      btn.innerHTML = label;

      if (!meetsReq) {
        btn.disabled = true;
        btn.title = `Ehhez kell: ${choice.requires}`;
      } else {
        btn.onclick = () => handleChoice(choice);
      }
      choicesEl.appendChild(btn);
    });
  }

  // Végkifejlet
  const outcomeArea = document.getElementById('outcome-area');
  const restartBtn  = document.getElementById('restart-btn');
  if (scene.ending) {
    const banner = document.getElementById('outcome-banner');
    banner.className = 'outcome-banner ' + scene.ending;
    banner.textContent = scene.ending === 'victory' ? '✦ Kalandod véget ért — győztesen ✦' : '✦ Kalandod itt ért véget ✦';
    outcomeArea.classList.add('visible');
    outcomeArea.style.animation = 'none';
    void outcomeArea.offsetWidth;
    outcomeArea.style.animation = 'fade-in 0.6s ease 0.5s forwards';
    restartBtn.classList.add('visible');
  } else {
    outcomeArea.classList.remove('visible');
    restartBtn.classList.remove('visible');
  }

  // Stat frissítés
  updateStats();
  updateInventory();

  // Scroll tetejére (mobilon fontos)
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/** Választás kezelése */
function handleChoice(choice) {
  // Tárgy adás/elvétel
  if (choice.gives)   addItem(choice.gives);
  if (choice.removes) removeItem(choice.removes);

  // Stat változtatások
  if (choice.hpDelta)    changeStat('hp',    choice.hpDelta);
  if (choice.luckDelta)  changeStat('luck',  choice.luckDelta);
  if (choice.skillDelta) changeStat('skill', choice.skillDelta);

  // Értesítők
  if (choice.hpDelta && choice.hpDelta < 0)
    showNotification(`⚔ ÉLETERŐ ${choice.hpDelta}`);
  if (choice.hpDelta && choice.hpDelta > 0)
    showNotification(`✦ ÉLETERŐ +${choice.hpDelta}`);
  if (choice.luckDelta && choice.luckDelta > 0)
    showNotification(`★ SZERENCSE +${choice.luckDelta}`);

  renderScene(choice.next);
}

/** Stat megjelenítés frissítése */
function updateStats() {
  const s = document.getElementById('stat-skill');
  const h = document.getElementById('stat-hp');
  const l = document.getElementById('stat-luck');

  s.textContent = player.skill;
  h.textContent = player.hp;
  l.textContent = player.luck;

  // Szín-jelzés
  h.className = 'stat-value' + (player.hp <= 4 ? ' low' : player.hp <= 8 ? ' med' : '');
  l.className = 'stat-value' + (player.luck <= 3 ? ' low' : player.luck <= 6 ? ' med' : '');
}

/** Tárgyak megjelenítése */
function updateInventory() {
  const el = document.getElementById('inventory-items');
  if (player.inventory.length === 0) {
    el.innerHTML = '<span class="inv-empty">üres</span>';
  } else {
    el.innerHTML = player.inventory.map(i => `<span class="inv-item">${i}</span>`).join('');
  }
}

/** Értesítő megjelenítése */
let notifTimer = null;
function showNotification(msg) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.classList.add('show');
  if (notifTimer) clearTimeout(notifTimer);
  notifTimer = setTimeout(() => n.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
//  INICIALIZÁLÁS
// ═══════════════════════════════════════════════

function initPlayer() {
  // Dobókocka szimulálás (1–6)
  const d6 = () => Math.floor(Math.random() * 6) + 1;

  player.skill    = d6() + 6;   // Harcos alap
  player.hp       = d6() * 2 + 12;
  player.luck     = d6() + 6;
  player.maxSkill = player.skill;
  player.maxHp    = player.hp;
  player.maxLuck  = player.luck;
  player.inventory = [];
}

function restartGame() {
  initPlayer();
  renderScene('start');
}

// ── Indítás ──
initPlayer();
renderScene('start');

</script>
