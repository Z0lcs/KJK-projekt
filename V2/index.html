<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Az Árnykúp Labirintusa — Kalandjáték</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <div id="app">

        <!-- ── Fejléc ── -->
        <header>
            <div class="game-title">Az Árnykúp Labirintusa</div>
            <div class="game-subtitle">Kaland-Játék-Varázslat &nbsp;·&nbsp; I. Könyv</div>
        </header>

        <!-- ── Állapotsor ── -->
        <div id="stats-bar">
            <div class="stat-pill">
                <span class="stat-label">ÜGYESSÉG</span>
                <span class="stat-value" id="stat-skill">—</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">ÉLETERŐ</span>
                <span class="stat-value" id="stat-hp">—</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">SZERENCSE</span>
                <span class="stat-value" id="stat-luck">—</span>
            </div>
        </div>

        <!-- ── Tárgyak ── -->
        <div id="inventory-bar">
            <span class="inv-label">Zsák:</span>
            <span id="inventory-items"><span class="inv-empty">üres</span></span>
        </div>

        <!-- ── Jelenet ── -->
        <section id="scene-area">
            <div id="scene-heading"></div>
            <div id="scene-text"></div>
            <div id="choices-area"></div>
            <div id="outcome-area">
                <div id="outcome-banner" class="outcome-banner"></div>
            </div>
            <button id="restart-btn" onclick="restartGame()">↺ &nbsp;Újrakezdés</button>
        </section>

    </div>

    <!-- ── Értesítő ── -->
    <div id="notification" id="notification"></div>
</body>

</html>
