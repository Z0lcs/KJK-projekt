<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJK project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="stlye.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="fullscreen-wrapper">

        <div class="button">
            <a href="index.html" title="Vissza"><i class="fa-solid fa-person-walking-arrow-loop-left"></i></a>
        </div>

        <div id="pop-up">

            <h2 id="description">Válassz ki egy szöveges fájlt (.txt):</h2>

            <div class="options-container">
                <input class="option-btn" type="file" id="fileButton" accept=".txt">
            </div>

            <br><br>

            <div id="file-status"></div>

            <br>

            <div class="options-container">
                <a href="index.html" id="continue" style="display:none;">Tovább a kalandra</a>
            </div>
        </div>

    </div>
</body>

</html>
